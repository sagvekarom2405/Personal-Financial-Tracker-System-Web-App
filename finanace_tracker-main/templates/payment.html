<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Upgrade to Premium</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='dashboard.css') }}">
    <style>
        body {
            background: linear-gradient(135deg, #f3f4f6, #e5e7eb);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
        }
        .premium-card {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
            width: 90%;
        }
        .premium-icon {
            font-size: 60px;
            margin-bottom: 20px;
            display: inline-block;
            background: #fef3c7;
            width: 100px;
            height: 100px;
            line-height: 100px;
            border-radius: 50%;
        }
        h1 { color: #1f2937; margin-bottom: 10px; }
        p { color: #6b7280; line-height: 1.6; margin-bottom: 30px; }
        .features { text-align: left; margin-bottom: 30px; }
        .features li { margin-bottom: 10px; color: #374151; list-style: none; }
        .features li::before { content: "✅"; margin-right: 10px; }
        .btn-upgrade {
            background: linear-gradient(to right, #f59e0b, #d97706);
            color: white;
            padding: 15px 30px;
            border-radius: 10px;
            text-decoration: none;
            font-weight: bold;
            display: inline-block;
            width: 100%;
            box-sizing: border-box;
            transition: transform 0.2s;
        }
        .btn-upgrade:hover { transform: scale(1.05); }
        .price { font-size: 32px; font-weight: bold; color: #1f2937; margin-bottom: 5px; }
        .duration { color: #9ca3af; font-size: 14px; margin-bottom: 20px; display: block; }
    </style>
</head>
<body>
    <div class="premium-card">
        <div class="premium-icon">👑</div>
        <h1>Upgrade to Premium</h1>
        <div class="price">₹499</div>
        <span class="duration">One-time payment</span>
        
        <ul class="features">
            <li>Unlock Financial Goals</li>
            <li>Advanced Charts & Analytics</li>
            <li>Unlimited Transaction History</li>
            <li>Priority Support</li>
        </ul>

        <a href="{{ url_for('payment_checkout') }}" class="btn-upgrade">Get Premium Now</a>
        <a href="{{ url_for('dashboard') }}" style="display: block; margin-top: 15px; color: #6b7280; text-decoration: none; font-size: 14px;">No thanks, take me back</a>
    </div>
</body>
</html>
